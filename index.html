            update(dt) {
                this.pauseCooldown = Math.max(0, this.pauseCooldown - dt);

                // Pause toggle
                if (this.pauseCooldown <= 0 && (inputManager.isKeyPressed('Escape') || inputManager.anyGamepadBack())) {
                    this.paused = !this.paused;
                    this.pauseOption = 0;
                    this.pauseCooldown = 0.3;
                    return null;
                }

                if (this.paused) return null;

                this.showLoreTimer = Math.max(0, this.showLoreTimer - dt);

                // Handle H key for controls help toggle
                if (inputManager.isKeyPressed('h') || inputManager.isKeyPressed('H')) {
                    this.showControlsHelp = !this.showControlsHelp;
                    this.controlsHelpTimer = 10;
                }

                // Auto-fade controls help
                if (this.controlsHelpTimer > 0) {
                    this.controlsHelpTimer -= dt;
                    if (this.controlsHelpTimer <= 0) {
                        this.showControlsHelp = false;
                    }
                }

                // Update player input and entities
                for (let i = 0; i < this.players.length; i++) {
                    const inputState = inputManager.getPlayerInput(i);
                    this.players[i].handleInput(inputState);
                    this.players[i].update(dt);
                }

                // Crear proyectiles de jugadores y procesar habilidades especiales
                const newProjectiles = [];
                for (let player of this.players) {
                    const projectiles = player.getAttackProjectiles();
                    newProjectiles.push(...projectiles);

                    // Clérigo: curación en área
                    if (player.healAllNearby) {
                        player.healAllNearby = false;
                        const healAmount = player.healAmount || 30;
                        for (let ally of this.players) {
                            if (ally.hp > 0) {
                                ally.heal(healAmount);
                            }
                        }
                    }
                }
                this.zone.projectiles.push(...newProjectiles);

                // Update zone
                this.zone.update(dt, this.players);

                // Check defeat condition
                const allPlayersDead = this.players.every(p => p.hp <= 0);
                if (allPlayersDead) {
                    return 'GAME_OVER';
                }

                // Check victory condition
                if (this.zone.defeated) {
                    return 'ZONE_COMPLETE';
                }

                return null;
            }

            draw(ctx) {
                this.zone.draw(ctx);

                // Draw players and HUD
                for (let i = 0; i < this.players.length; i++) {
                    const player = this.players[i];
                    player.draw(ctx);

                    // HUD para cada jugador
                    this.drawPlayerHUD(ctx, player, i);
                }

                // Zone name and lore
                if (this.showLoreTimer > 0) {
                    this.drawLoreBox(ctx);
                }

                // Controls help
                if (this.showControlsHelp) {
                    this.drawControlsHelp(ctx);
                }

                // Pause menu overlay
                if (this.paused) {
                    this.drawPauseMenu(ctx);
                }
            }

            drawPlayerHUD(ctx, player, index) {
                const hudX = 10 + index * 300;
                const hudY = 10;

                // Background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(hudX - 2, hudY - 2, 290, 110);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(hudX - 2, hudY - 2, 290, 110);

                // Class name and level
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`P${player.index + 1}: ${player.classStats.name} Nv.${player.level}`, hudX + 5, hudY + 15);

                // HP bar with gradient
                const hpBarWidth = 150;
                const hpBarHeight = 8;
                const healthPercent = Math.max(0, player.hp / player.maxHp);
                const hpColor = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';

                ctx.fillStyle = '#333';
                ctx.fillRect(hudX + 5, hudY + 25, hpBarWidth, hpBarHeight);
                ctx.fillStyle = hpColor;
                ctx.fillRect(hudX + 5, hudY + 25, hpBarWidth * healthPercent, hpBarHeight);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(hudX + 5, hudY + 25, hpBarWidth, hpBarHeight);

                ctx.fillStyle = '#fff';
                ctx.font = '10px Arial';
                ctx.fillText(`HP: ${Math.ceil(player.hp)}/${player.maxHp}`, hudX + 5, hudY + 45);

                // Energy bar
                const energyPercent = player.energy / player.maxEnergy;
                ctx.fillStyle = '#333';
                ctx.fillRect(hudX + 5, hudY + 50, hpBarWidth, 4);
                ctx.fillStyle = '#4169e1';
                ctx.fillRect(hudX + 5, hudY + 50, hpBarWidth * energyPercent, 4);
                ctx.fillStyle = '#fff';
                ctx.font = '9px Arial';
                ctx.fillText(`EN: ${Math.ceil(player.energy)}/100`, hudX + 5, hudY + 67);

                // Coins display with icon
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 10px Arial';
                ctx.fillText(`◉ ${player.coins}`, hudX + 5, hudY + 90);

                // Combo counter
                if (player.comboCounter > 1) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText(`COMBO x${player.comboCounter}`, hudX + 280, hudY + 30);
                }
            }

            drawLoreBox(ctx) {
                const boxWidth = 700;
                const boxHeight = 160;
                const boxX = CONFIG.CANVAS_WIDTH / 2 - boxWidth / 2;
                const boxY = CONFIG.CANVAS_HEIGHT - 180;

                const alpha = this.showLoreTimer > 3 ? 1 : this.showLoreTimer / 3;
                ctx.globalAlpha = alpha;

                // Background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(boxX - 5, boxY - 5, boxWidth + 10, boxHeight + 10);

                ctx.lineWidth = 3;
                ctx.strokeRect(boxX - 5, boxY - 5, boxWidth + 10, boxHeight + 10);

                ctx.font = 'bold 20px Arial';

                ctx.font = '14px Arial';

                lines.forEach((line, i) => {
                    ctx.fillText(line, CONFIG.CANVAS_WIDTH / 2, boxY + 50 + i * 20);

            drawControlsHelp(ctx) {
                if (!this.showControlsHelp) return;

                const boxWidth = 320;
                const boxHeight = 160;
                const boxX = CONFIG.CANVAS_WIDTH - boxWidth - 20;
                const boxY = CONFIG.CANVAS_HEIGHT - boxHeight - 20;

                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);

                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('CONTROLES', boxX + 10, boxY + 18);

                ctx.fillStyle = '#aaa';
                ctx.font = '10px Arial';
                ctx.fillText('--- Teclado ---', boxX + 10, boxY + 35);

                ctx.font = '11px Arial';
                ctx.fillText('WASD / Flechas: Mover', boxX + 10, boxY + 50);
                ctx.fillText('SPACE/Enter: Atacar | K: Especial | L: Esquivar', boxX + 10, boxY + 64);

                ctx.fillStyle = '#aaa';
                ctx.font = '10px Arial';
                ctx.fillText('--- Mando ---', boxX + 10, boxY + 82);
                ctx.fillStyle = '#ccc';
                ctx.font = '11px Arial';
                ctx.fillText('Stick: Mover', boxX + 10, boxY + 97);
                ctx.fillText('A/X: Atacar | B/Y: Especial | RB: Esquivar', boxX + 10, boxY + 111);

                ctx.fillStyle = '#888';
                ctx.font = '10px Arial';
                ctx.fillText('Pulsa H para ocultar', boxX + 10, boxY + 135);
            }

            handleInput(inputManager) {
                if (!this.paused) return null;

                const kbUp = inputManager.isKeyPressed('ArrowUp') || inputManager.isKeyPressed('w') || inputManager.isKeyPressed('W');
                const kbDown = inputManager.isKeyPressed('ArrowDown') || inputManager.isKeyPressed('s') || inputManager.isKeyPressed('S');
                const kbConfirm = inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter');

                if (kbUp || inputManager.anyGamepadUp()) {
                    this.pauseOption = (this.pauseOption - 1 + 3) % 3;
                    audioSystem.playSfx('menuSelect');
                }
                if (kbDown || inputManager.anyGamepadDown()) {
                    this.pauseOption = (this.pauseOption + 1) % 3;
                    audioSystem.playSfx('menuSelect');
                }

                if (kbConfirm || inputManager.anyGamepadConfirm()) {
                    if (this.pauseOption === 0) {
                        // Resume
                        this.paused = false;
                        this.pauseCooldown = 0.3;
                    } else if (this.pauseOption === 1) {
                        // New game
                        return 'TITLE';
                    } else if (this.pauseOption === 2) {
                        // Resume (same as 0)
                        this.paused = false;
                        this.pauseCooldown = 0.3;
                    }
                }

                return null;
            }

            drawPauseMenu(ctx) {
                // Dim background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                // Pause box
                const boxW = 400;
                const boxH = 280;
                const boxX = (CONFIG.CANVAS_WIDTH - boxW) / 2;
                const boxY = (CONFIG.CANVAS_HEIGHT - boxH) / 2;

                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(boxX, boxY, boxW, boxH);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.strokeRect(boxX, boxY, boxW, boxH);

                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', CONFIG.CANVAS_WIDTH / 2, boxY + 50);

                const options = ['Continuar', 'Nueva Partida', 'Volver al juego'];
                for (let i = 0; i < 2; i++) {
                    const optY = boxY + 90 + i * 60;
                    const isSelected = this.pauseOption === i;

                    if (isSelected) {
                        ctx.fillStyle = 'rgba(255, 255, 0, 0.15)';
                        ctx.fillRect(boxX + 20, optY, boxW - 40, 45);
                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(boxX + 20, optY, boxW - 40, 45);
                    }

                    ctx.fillStyle = isSelected ? '#ffff00' : '#fff';
                    ctx.font = isSelected ? 'bold 24px Arial' : '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(options[i], CONFIG.CANVAS_WIDTH / 2, optY + 30);
                }

                ctx.fillStyle = '#888';
                ctx.font = '14px Arial';
                ctx.fillText('ESC / B para volver al juego', CONFIG.CANVAS_WIDTH / 2, boxY + boxH - 20);
            }
        }

            { name: 'Muralla de Hierro', arrival: 'El ruido de los martillos y la armadura resonando indica disciplina y rigor. Sin embargo, hay tensión: la ciudad parece vigilante y hostil.', theme: '#888899' },
            { name: 'Aldea del Desvarío', arrival: 'Puertas que giran, casas al revés, y habitantes riendo de forma extraña. Este pueblo ha perdido el sentido común desde la desaparición del Grial.', theme: '#aa44aa' },
            { name: 'Forja Carmesí', arrival: 'El calor es sofocante y el suelo tiembla bajo tus pies. El pueblo se ha convertido en un volcán activo.', theme: '#cc3300' },

        class ZoneIntroScreen extends Screen {
            constructor(zoneIndex, players) {
                super();
                this.zoneIndex = zoneIndex;
                this.players = players;
                this.timer = 0;
                this.inputCooldown = 1.0;
                this.info = ZONE_INFO[zoneIndex];
            }

            draw(ctx) {
                // Dark background with theme color glow
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                // Theme colored vignette
                const gradient = ctx.createRadialGradient(
                    CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 0,
                    CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 500
                );
                gradient.addColorStop(0, this.info.theme + '44');
                gradient.addColorStop(1, '#000000');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                // Floating particles
                for (let i = 0; i < 30; i++) {
                    const x = CONFIG.CANVAS_WIDTH * 0.5 + Math.sin(this.timer * 0.8 + i * 1.2) * 300;
                    const y = CONFIG.CANVAS_HEIGHT * 0.5 + Math.cos(this.timer * 0.6 + i * 0.9) * 200;
                    ctx.globalAlpha = Math.sin(this.timer + i) * 0.3 + 0.2;
                    ctx.fillStyle = this.info.theme;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Zone number
                ctx.fillStyle = '#888';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Zona ${this.zoneIndex + 1} de 6`, CONFIG.CANVAS_WIDTH / 2, 100);

                // Zone name with glow
                const glow = Math.sin(this.timer * 2) * 0.2 + 0.8;
                ctx.globalAlpha = glow;
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 56px Arial';
                ctx.fillText(this.info.name, CONFIG.CANVAS_WIDTH / 2, 180);
                ctx.globalAlpha = 1;

                // Decorative line
                ctx.strokeStyle = this.info.theme;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(CONFIG.CANVAS_WIDTH / 2 - 200, 210);
                ctx.lineTo(CONFIG.CANVAS_WIDTH / 2 + 200, 210);
                ctx.stroke();

                // Arrival text (word wrapped)
                ctx.fillStyle = '#ccc';
                ctx.font = '18px Arial';
                ctx.textAlign = 'center';
                const words = this.info.arrival.split(' ');
                let line = '';
                let lineY = 270;
                const maxWidth = CONFIG.CANVAS_WIDTH - 200;
                for (const word of words) {
                    const testLine = line + word + ' ';
                    if (ctx.measureText(testLine).width > maxWidth && line !== '') {
                        ctx.fillText(line.trim(), CONFIG.CANVAS_WIDTH / 2, lineY);
                        line = word + ' ';
                        lineY += 28;
                    } else {
                        line = testLine;
                    }
                }
                if (line.trim()) ctx.fillText(line.trim(), CONFIG.CANVAS_WIDTH / 2, lineY);

                // Prompt to continue
                if (this.inputCooldown <= 0) {
                    const pulseAlpha = Math.sin(this.timer * 4) * 0.3 + 0.5;
                    ctx.globalAlpha = pulseAlpha;
                    ctx.fillStyle = '#ffff00';
                    ctx.font = '20px Arial';
                    ctx.fillText('Presiona SPACE o A para entrar', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - 80);
                    ctx.globalAlpha = 1;
                }
            }

            update(dt) {
                this.timer += dt;
                this.inputCooldown = Math.max(0, this.inputCooldown - dt);
            }

            handleInput(inputManager) {
                if (this.inputCooldown > 0) return null;
                if (inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter') || inputManager.anyGamepadConfirm()) {
                    return 'START_ZONE';
                }
                return null;
            }
        }

        class UpgradeScreen extends Screen {
            constructor(players, currentZoneIndex) {
                super();
                this.players = players;
                this.currentZoneIndex = currentZoneIndex;
                this.currentPlayerIndex = 0;
                this.selectedOption = 0; // 0: Subir Nivel, 1: Curar, 2: Continuar
                this.inputCooldown = 0;
                this.timer = 0;
            }

            draw(ctx) {
                // Dark background with golden border
                const gradient = ctx.createLinearGradient(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#16213e');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                const player = this.players[this.currentPlayerIndex];

                // Title
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Mejoras - Jugador ${this.currentPlayerIndex + 1}`, CONFIG.CANVAS_WIDTH / 2, 50);

                // Player info box
                const infoX = 100, infoY = 100;
                const infoW = CONFIG.CANVAS_WIDTH - 200, infoH = 140;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(infoX, infoY, infoW, infoH);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`${player.classStats.name} Nv.${player.level}`, infoX + 20, infoY + 35);
                ctx.fillText(`Monedas: ${player.coins}`, infoX + 20, infoY + 65);
                ctx.fillText(`HP: ${player.hp}/${player.maxHp}`, infoX + 20, infoY + 95);

                // Stats bars
                const statX = infoX + infoW / 2;
                ctx.font = '14px Arial';
                ctx.fillStyle = '#aaa';
                ctx.textAlign = 'left';

                const barY = infoY + 40;
                const barHeight = 16;
                const barWidth = 150;

                // ATK bar
                ctx.fillText('ATK', statX, barY);
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(statX + 40, barY - 10, (player.classStats.attack / 25) * barWidth, barHeight);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(statX + 40, barY - 10, barWidth, barHeight);

                // DEF bar
                ctx.fillStyle = '#4a9aff';
                ctx.fillText('DEF', statX, barY + 30);
                ctx.fillRect(statX + 40, barY + 20, (player.classStats.defense / 10) * barWidth, barHeight);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(statX + 40, barY + 20, barWidth, barHeight);

                // SPD bar
                ctx.fillStyle = '#ffcc00';
                ctx.fillText('SPD', statX, barY + 60);
                ctx.fillRect(statX + 40, barY + 50, (player.classStats.speed / 350) * barWidth, barHeight);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(statX + 40, barY + 50, barWidth, barHeight);

                // Options
                const optionsY = 280;
                const optionHeight = 80;
                const options = [
                    { label: 'Subir Nivel', cost: player.getLevelCost(player.level + 1), canAfford: player.level < 10 && player.coins >= player.getLevelCost(player.level + 1) },
                    { label: 'Curar', cost: 5, canAfford: player.coins >= 5 },
                    { label: 'Continuar', cost: 0, canAfford: true }
                ];

                for (let i = 0; i < options.length; i++) {
                    const opt = options[i];
                    const optY = optionsY + i * optionHeight;
                    const isSelected = this.selectedOption === i;

                    // Highlight selected
                    if (isSelected) {
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.globalAlpha = 0.2;
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(150, optY, CONFIG.CANVAS_WIDTH - 300, optionHeight - 10);
                        ctx.globalAlpha = 1;
                        ctx.globalCompositeOperation = 'source-over';

                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(150, optY, CONFIG.CANVAS_WIDTH - 300, optionHeight - 10);
                    }

                    // Label
                    ctx.fillStyle = isSelected ? '#ffff00' : '#fff';
                    ctx.font = isSelected ? 'bold 24px Arial' : '20px Arial';
                    ctx.textAlign = 'left';
                    ctx.fillText(opt.label, 180, optY + 25);

                    // Cost
                    const costText = opt.label === 'Continuar' ? '' : `Costo: ${opt.cost} monedas`;
                    ctx.fillStyle = opt.canAfford ? '#aaffaa' : '#ff6666';
                    ctx.font = '14px Arial';
                    ctx.fillText(costText, 180, optY + 50);

                    // Status
                    if (opt.label === 'Subir Nivel' && player.level >= 10) {
                        ctx.fillStyle = '#ff6666';
                        ctx.fillText('(Máximo nivel alcanzado)', 450, optY + 25);
                    }
                }

                // Instructions
                ctx.fillStyle = '#666';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Jugador ${this.currentPlayerIndex + 1} de ${this.players.length} | W/S o Flechas para navegar, SPACE/Enter/A para confirmar`, CONFIG.CANVAS_WIDTH / 2, 660);
            }

            update(dt) {
                this.timer += dt;
            }

            handleInput(inputManager) {
                this.inputCooldown = Math.max(0, this.inputCooldown - 0.016);
                if (this.inputCooldown > 0) return null;

                const player = this.players[this.currentPlayerIndex];
                const kbUp = inputManager.isKeyPressed('ArrowUp') || inputManager.isKeyPressed('w') || inputManager.isKeyPressed('W');
                const kbDown = inputManager.isKeyPressed('ArrowDown') || inputManager.isKeyPressed('s') || inputManager.isKeyPressed('S');
                const kbConfirm = inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter');

                if (kbUp || inputManager.anyGamepadUp()) {
                    this.selectedOption = (this.selectedOption - 1 + 3) % 3;
                    this.inputCooldown = 0.2;
                }
                if (kbDown || inputManager.anyGamepadDown()) {
                    this.selectedOption = (this.selectedOption + 1) % 3;
                    this.inputCooldown = 0.2;
                }

                if (kbConfirm || inputManager.anyGamepadConfirm()) {
                    if (this.selectedOption === 0) {
                        // Level up
                        if (player.level < 10 && player.coins >= player.getLevelCost(player.level + 1)) {
                            player.levelUp();
                            audioSystem.playSfx('levelup');
                            this.inputCooldown = 0.3;
                        }
                    } else if (this.selectedOption === 1) {
                        // Heal
                        if (player.coins >= 5) {
                            player.coins -= 5;
                            player.heal(player.maxHp);
                            audioSystem.playSfx('levelup');
                            this.inputCooldown = 0.3;
                        }
                    } else if (this.selectedOption === 2) {
                        // Continue
                        this.currentPlayerIndex++;
                        if (this.currentPlayerIndex >= this.players.length) {
                            return 'SHOP_DONE';
                        }
                        this.selectedOption = 0;
                        this.inputCooldown = 0.3;
                    }
                }

                return null;
            }
        }

            draw(ctx) {

                for (let i = 0; i < 50; i++) {
                    const x = CONFIG.CANVAS_WIDTH * Math.sin(this.timer + i) * 0.5 + CONFIG.CANVAS_WIDTH / 2 + i * 10;
                    const y = ((this.timer * 200 + i * 50) % CONFIG.CANVAS_HEIGHT);
                    ctx.fillStyle = ['#ffff00', '#ff6600', '#00ff00', '#ff00ff'][i % 4];
                    ctx.fillRect(x % CONFIG.CANVAS_WIDTH, y, 4, 4);
                }

                // Grail
                const grailX = CONFIG.CANVAS_WIDTH / 2;
                const grailY = 150 + Math.sin(this.timer * 3) * 10;
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 3; i++) {
                    ctx.globalAlpha = (1 - i / 3) * 0.4;
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(grailX - 40 - i * 5, grailY - 30 - i * 5, 80 + i * 10, 60 + i * 10);
                }
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';

                ctx.fillStyle = '#ffff99';
                ctx.fillRect(grailX - 40, grailY - 30, 80, 60);

                // Text
                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 72px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('¡VICTORIA!', CONFIG.CANVAS_WIDTH / 2, 270);

                ctx.fillStyle = '#fff';
                ctx.font = '28px Arial';
                ctx.fillText('¡Has recuperado el Santo Grial!', CONFIG.CANVAS_WIDTH / 2, 330);
                ctx.fillText('Presiona SPACE o A para continuar', CONFIG.CANVAS_WIDTH / 2, 380);
            }

            update(dt) {
                this.timer += dt;
            }

            handleInput(inputManager) {
                if (inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter') || inputManager.anyGamepadConfirm()) {
                    return 'TITLE';
                }
                return null;
            }
        }

        class GameOverScreen extends Screen {
            constructor() {
                super();
                this.timer = 0;
            }

            draw(ctx) {
                // Red vignette
                const gradient = ctx.createRadialGradient(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 0, CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 600);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(1, 'rgba(255, 0, 0, 0.5)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                ctx.fillStyle = '#8b0000';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                ctx.globalAlpha = 0.5;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                ctx.globalAlpha = 1;

                // Text
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 72px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CONFIG.CANVAS_WIDTH / 2, 250);

                ctx.fillStyle = '#fff';
                ctx.font = '28px Arial';
                ctx.fillText('Has caído en combate...', CONFIG.CANVAS_WIDTH / 2, 330);
                ctx.fillText('Presiona SPACE o A para reintentar', CONFIG.CANVAS_WIDTH / 2, 380);
            }

            update(dt) {
                this.timer += dt;
            }

            handleInput(inputManager) {
                if (inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter') || inputManager.anyGamepadConfirm()) {
                    return 'TITLE';
                }
                return null;
            }
        }

        // ==================== JUEGO PRINCIPAL ====================
        class Game {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.ctx.imageSmoothingEnabled = false;

                // Ajustar canvas al tamaño de la ventana
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                this.state = 'TITLE';
                this.currentScreen = new TitleScreen();
                this.selectedClasses = [];
                this.playerCount = 1;
                this.lastTime = Date.now();
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            changeState(newState) {
                if (typeof newState === 'object') {
                    if (newState.selectedClasses) this.selectedClasses = newState.selectedClasses;
                    if (newState.playerCount) this.playerCount = newState.playerCount;
                    this.state = newState.nextState;
                } else {
                    this.state = newState;
                }

                // Crear nueva pantalla según el estado
                switch (this.state) {
                    case 'TITLE':
                        this.currentScreen = new TitleScreen();
                        break;
                    case 'PLAYER_COUNT_SELECT':
                        this.currentScreen = new PlayerCountSelectScreen();
                        break;
                    case 'DIFFICULTY_SELECT':
                        this.currentScreen = new DifficultySelectScreen();
                        break;
                    case 'CHARACTER_SELECT':
                        this.currentScreen = new CharacterSelectScreen(this.playerCount);
                        break;
                    case 'PLAYING':
                        // First zone: show intro screen first
                        this.currentScreen = new ZoneIntroScreen(0, null);
                        this.state = 'ZONE_INTRO';
                        this._pendingPlayers = null;
                        this._pendingZone = 0;
                        break;
                    case 'START_ZONE':
                        // Actually start gameplay
                        if (this._pendingPlayers) {
                            // Coming from shop - reuse players
                            const gpFromIntro = new GameplayScreen(this.selectedClasses);
                            gpFromIntro.currentZoneIndex = this._pendingZone;
                            gpFromIntro.players = this._pendingPlayers;
                            gpFromIntro.loadZone(this._pendingZone);
                            this.currentScreen = gpFromIntro;
                        } else {
                            // New game - first zone
                            this.currentScreen = new GameplayScreen(this.selectedClasses);
                        }
                        this.state = 'PLAYING_ACTIVE';
                        break;
                    case 'ZONE_COMPLETE':
                        const completedZone = this.currentScreen.currentZoneIndex;
                        const completedPlayers = this.currentScreen.players;
                        const completedZoneName = this.currentScreen.zone ? this.currentScreen.zone.name : '';
                        if (completedZone >= 5) {
                            this.currentScreen = new VictoryScreen();
                            this.state = 'VICTORY';
                        } else {
                            this.currentScreen = new ZoneCompleteScreen(completedZone, completedPlayers, completedZoneName);
                            this.state = 'ZONE_COMPLETE_SCREEN';
                        }
                        break;
                    case 'SHOW_SHOP':
                        this.currentScreen = new UpgradeScreen(this.currentScreen.players, this.currentScreen.zoneIndex);
                        this.state = 'UPGRADE_SHOP';
                        break;
                    case 'SHOP_DONE':
                        const nextZoneFromShop = this.currentScreen.currentZoneIndex + 1;
                        this._pendingPlayers = this.currentScreen.players;
                        this._pendingZone = nextZoneFromShop;
                        this.currentScreen = new ZoneIntroScreen(nextZoneFromShop, this.currentScreen.players);
                        this.state = 'ZONE_INTRO';
                        break;
                    case 'ZONE_1':
                        this.currentScreen = new GameplayScreen(this.selectedClasses);
                        this.currentScreen.loadZone(1);
                        break;
                    case 'ZONE_2':
                        this.currentScreen.loadZone(2);
                        break;
                    case 'ZONE_3':
                        this.currentScreen.loadZone(3);
                        break;
                    case 'ZONE_4':
                        this.currentScreen.loadZone(4);
                        break;
                    case 'ZONE_5':
                        this.currentScreen.loadZone(5);
                        break;
                    case 'VICTORY':
                        this.currentScreen = new VictoryScreen();
                        break;
                    case 'GAME_OVER':
                        this.currentScreen = new GameOverScreen();
                        break;
                }
            }

            update(dt) {
                inputManager.update();

                let nextState = this.currentScreen.update(dt);
                if (nextState) {
                    this.changeState(nextState);
                }

                let inputResult = this.currentScreen.handleInput(inputManager);
                if (inputResult) {
                    this.changeState(inputResult);
                }

                inputManager.endFrame();
            }

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Escalar el contenido del juego
                const scaleX = this.canvas.width / CONFIG.CANVAS_WIDTH;
                const scaleY = this.canvas.height / CONFIG.CANVAS_HEIGHT;
                const scale = Math.min(scaleX, scaleY);

                this.ctx.save();
                this.ctx.scale(scale, scale);

                this.currentScreen.draw(this.ctx);

                this.ctx.restore();
            }

            loop() {
                const currentTime = Date.now();
                const dt = (currentTime - this.lastTime) / 1000;
                this.lastTime = currentTime;

                this.update(dt);
                this.draw();

                requestAnimationFrame(() => this.loop());
            }

            start() {
                this.loop();
            }
        }

        // ==================== INICIALIZACIÓN ====================
        window.addEventListener('load', () => {
            const canvas = document.getElementById('gameCanvas');
            const game = new Game(canvas);
            game.start();
        });
    </script>
</body>
</html>
