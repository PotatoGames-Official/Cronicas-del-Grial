        // ==================== UTILIDADES ====================
        class Vector2 {
            constructor(x = 0, y = 0) {
                this.x = x;
                this.y = y;
            }

            add(v) {
                return new Vector2(this.x + v.x, this.y + v.y);
            }

            subtract(v) {
                return new Vector2(this.x - v.x, this.y - v.y);
            }

            multiply(scalar) {
                return new Vector2(this.x * scalar, this.y * scalar);
            }

            distance(v) {
                const dx = this.x - v.x;
                const dy = this.y - v.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            normalize() {
                const len = Math.sqrt(this.x * this.x + this.y * this.y);
                if (len === 0) return new Vector2(0, 0);
                return new Vector2(this.x / len, this.y / len);
            }

            length() {
                return Math.sqrt(this.x * this.x + this.y * this.y);
            }
        }

        // ==================== FLOATING TEXT ====================
        class FloatingText {
            constructor(x, y, text, color, lifetime = 1) {
                this.position = new Vector2(x, y);
                this.text = text;
                this.color = color;
                this.lifetime = lifetime;
                this.maxLifetime = lifetime;
                this.velocity = new Vector2(0, -80);
            }

            update(dt) {
                this.lifetime -= dt;
                this.position = this.position.add(this.velocity.multiply(dt));
            }

            draw(ctx) {
                const alpha = this.lifetime / this.maxLifetime;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.position.x, this.position.y);
                ctx.globalAlpha = 1;
            }

            isAlive() {
                return this.lifetime > 0;
            }
        }

        // ==================== SISTEMA DE PARTÍCULAS ====================
        class Particle {
            constructor(x, y, vx, vy, lifetime, color, size = 4, alpha = 1) {
                this.position = new Vector2(x, y);
                this.velocity = new Vector2(vx, vy);
                this.lifetime = lifetime;
                this.maxLifetime = lifetime;
                this.color = color;
                this.size = size;
                this.initialAlpha = alpha;
                this.gravity = 0;
            }

            update(dt) {
                this.lifetime -= dt;
                this.position = this.position.add(this.velocity.multiply(dt));
                this.velocity.y += this.gravity * dt;
            }

            draw(ctx) {
                const alpha = (this.lifetime / this.maxLifetime) * this.initialAlpha;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.position.x - this.size / 2, this.position.y - this.size / 2, this.size, this.size);
                ctx.globalAlpha = 1;
            }

            isAlive() {
                return this.lifetime > 0;
            }
        }

        class ParticleSystem {
            constructor() {
                this.particles = [];
            }

            emit(x, y, vx, vy, lifetime, color, size = 4) {
                this.particles.push(new Particle(x, y, vx, vy, lifetime, color, size));
            }

            burst(x, y, count, velocity, lifetime, colors) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const speed = velocity * (0.7 + Math.random() * 0.3);
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.emit(x, y, vx, vy, lifetime, color, 3 + Math.random() * 3);
                }
            }

            ambient(x, y, vx, vy, lifetime, color, size = 2) {
                const randomVx = vx + (Math.random() - 0.5) * 20;
                const randomVy = vy + (Math.random() - 0.5) * 20;
                this.emit(x, y, randomVx, randomVy, lifetime, color, size);
            }

            update(dt) {
                this.particles = this.particles.filter(p => p.isAlive());
                for (let p of this.particles) {
                    p.update(dt);
                }
            }

            draw(ctx) {
                for (let p of this.particles) {
                    p.draw(ctx);
                }
            }
        }

        const particleSystem = new ParticleSystem();

        // ==================== SISTEMA DE AUDIO ====================
        class AudioSystem {
            constructor() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            playSound(freq, duration, type = 'sine') {
                const now = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();

                osc.connect(gain);
                gain.connect(this.audioContext.destination);

                osc.frequency.value = freq;
                osc.type = type;

                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.start(now);
                osc.stop(now + duration);
            }

            playSfx(name) {
                const sfxMap = {
                    'attack': () => this.playSound(400, 0.1),
                    'hit': () => {
                        this.playSound(150, 0.2, 'sawtooth');
                        setTimeout(() => this.playSound(100, 0.15, 'square'), 50);
                    },
                    'enemyHit': () => this.playSound(250, 0.1, 'square'),
                    'levelup': () => {
                        this.playSound(500, 0.1);
                        setTimeout(() => this.playSound(700, 0.1), 100);
                    },
                    'special': () => this.playSound(800, 0.2),
                    'dodge': () => this.playSound(300, 0.08),
                    'coin': () => this.playSound(900, 0.08),
                    'menuSelect': () => this.playSound(500, 0.05),
                    'menuBack': () => this.playSound(250, 0.08, 'square'),
                    'victory': () => {
                        this.playSound(500, 0.1);
                        setTimeout(() => this.playSound(700, 0.1), 100);
                        setTimeout(() => this.playSound(900, 0.2), 200);
                    },
                    'death': () => {
                        this.playSound(200, 0.3, 'sawtooth');
                        setTimeout(() => this.playSound(100, 0.4, 'sawtooth'), 150);
                    }
                };

                if (sfxMap[name]) sfxMap[name]();
            }
        }

        // ==================== SISTEMA DE INPUT ====================
        class InputManager {
            constructor() {
                this.keys = {};
                this.pressedThisFrame = new Set();
                this.gamepads = [];

                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    this.pressedThisFrame.add(e.key);
                });

                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            }

            update() {
                this.gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            }

            endFrame() {
                this.pressedThisFrame.clear();
            }

            isKeyPressed(key) {
                const pressed = this.pressedThisFrame.has(key);
                this.pressedThisFrame.delete(key);
                return pressed;
            }

            // Gamepad helpers for menus (any connected gamepad)
            anyGamepadConfirm() {
                for (const gp of this.gamepads) {
                    if (gp && (gp.buttons[0]?.pressed || gp.buttons[2]?.pressed)) return true;
                }
                return false;
            }

            anyGamepadUp() {
                for (const gp of this.gamepads) {
                    if (gp && (gp.axes[1] < -0.6 || gp.buttons[12]?.pressed)) return true;
                }
                return false;
            }

            anyGamepadDown() {
                for (const gp of this.gamepads) {
                    if (gp && (gp.axes[1] > 0.6 || gp.buttons[13]?.pressed)) return true;
                }
                return false;
            }

            anyGamepadBack() {
                for (const gp of this.gamepads) {
                    if (gp && (gp.buttons[1]?.pressed || gp.buttons[8]?.pressed)) return true;
                }
                return false;
            }

            getPlayerInput(playerIndex) {
                const input = {
                    up: false,
                    down: false,
                    left: false,
                    right: false,
                    attack: false,
                    special: false,
                    dodge: false
                };

                // Keyboard (player 1 always, others ignore)
                if (playerIndex === 0) {
                    input.up = this.keys['w'] || this.keys['W'] || this.keys['ArrowUp'];
                    input.down = this.keys['s'] || this.keys['S'] || this.keys['ArrowDown'];
                    input.left = this.keys['a'] || this.keys['A'] || this.keys['ArrowLeft'];
                    input.right = this.keys['d'] || this.keys['D'] || this.keys['ArrowRight'];
                    input.attack = this.keys['j'] || this.keys['J'] || this.keys[' '] || this.keys['Enter'];
                    input.special = this.keys['k'] || this.keys['K'];
                    input.dodge = this.keys['l'] || this.keys['L'];
                }

                // Gamepad (ALL players including player 1)
                const gamepad = this.gamepads[playerIndex];
                if (gamepad) {
                    input.up = input.up || gamepad.axes[1] < -0.4;
                    input.down = input.down || gamepad.axes[1] > 0.4;
                    input.left = input.left || gamepad.axes[0] < -0.4;
                    input.right = input.right || gamepad.axes[0] > 0.4;
                    input.attack = input.attack || gamepad.buttons[0]?.pressed || gamepad.buttons[2]?.pressed;
                    input.special = input.special || gamepad.buttons[1]?.pressed || gamepad.buttons[3]?.pressed;
                    input.dodge = input.dodge || gamepad.buttons[4]?.pressed || gamepad.buttons[5]?.pressed;
                }

                return input;
            }
        }

        // ==================== DIBUJO DE SPRITES ====================
        class SpriteRenderer {
            static drawPixel(ctx, x, y, size, color) {
                ctx.fillStyle = color;
                ctx.fillRect(x, y, size, size);
            }

            static drawGlow(ctx, x, y, size, color, strength = 1) {
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 3; i++) {
                    ctx.globalAlpha = (1 - i / 3) * 0.3 * strength;
                    ctx.fillStyle = color;
                    ctx.fillRect(x - i * 2, y - i * 2, size + i * 4, size + i * 4);
                }
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';
            }

            static drawPlayerSprite(ctx, x, y, classType, direction = 'down', isAttacking = false) {
                const scale = 2;
                const size = 8 * scale;
                const charClass = CHARACTER_CLASSES[classType];
                const color = `rgb(${charClass.color.r}, ${charClass.color.g}, ${charClass.color.b})`;

                // Draw glow
                this.drawGlow(ctx, x + 4, y + 4, 16 * scale, charClass.glowColor, 0.6);

                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(x + 8 * scale, y + 14 * scale, 6 * scale, 2 * scale, 0, 0, Math.PI * 2);
                ctx.fill();

                // Cuerpo
                ctx.fillStyle = color;
                ctx.fillRect(x + 2 * scale, y + 4 * scale, 12 * scale, 10 * scale);

                // Cabeza
                ctx.fillStyle = '#ffdbac';
                ctx.fillRect(x + 4 * scale, y, 8 * scale, 8 * scale);

                // Ojos
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 5 * scale, y + 2 * scale, 2 * scale, 2 * scale);
                ctx.fillRect(x + 9 * scale, y + 2 * scale, 2 * scale, 2 * scale);

                // Brazos
                ctx.fillStyle = '#ffdbac';
                ctx.fillRect(x + 1 * scale, y + 5 * scale, 2 * scale, 8 * scale);
                ctx.fillRect(x + 13 * scale, y + 5 * scale, 2 * scale, 8 * scale);

                // Class-specific features
                if (classType === 'CABALLERO') {
                    ctx.fillStyle = '#c0c0c0';
                    ctx.fillRect(x + 2 * scale, y + 4 * scale, 1 * scale, 8 * scale); // Shield
                }
                if (classType === 'MAGO') {
                    ctx.fillStyle = '#4169e1';
                    ctx.fillRect(x + 13 * scale, y + 2 * scale, 2 * scale, 4 * scale); // Staff
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(x + 14 * scale, y + 1 * scale, 1.5 * scale, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            static drawEnemySprite(ctx, x, y, enemyType, frame = 0) {
                const scale = 2;

                // Draw shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.beginPath();
                ctx.ellipse(x + 8 * scale, y + 14 * scale, 5 * scale, 1.5 * scale, 0, 0, Math.PI * 2);
                ctx.fill();

                const sprites = {
                    bandido: () => {
                        this.drawGlow(ctx, x + 2 * scale, y + 2 * scale, 12 * scale, '#ff6b6b', 0.4);
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 2 * scale, y + 4 * scale, 12 * scale, 10 * scale);
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x + 4 * scale, y, 8 * scale, 8 * scale);
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(x + 5 * scale, y + 2 * scale, 6 * scale, 2 * scale);
                    },
                    raiz: () => {
                        this.drawGlow(ctx, x + 4 * scale, y + 4 * scale, 8 * scale, '#22dd22', 0.3);
                        ctx.fillStyle = '#2d5016';
                        ctx.beginPath();
                        ctx.arc(x + 8 * scale, y + 8 * scale, 8 * scale, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a3d0a';
                        for (let i = 0; i < 4; i++) {
                            const angle = (i / 4) * Math.PI * 2 + frame * 0.1;
                            const px = x + 8 * scale + Math.cos(angle) * 6 * scale;
                            const py = y + 8 * scale + Math.sin(angle) * 6 * scale;
                            ctx.fillRect(px - 2 * scale, py - 2 * scale, 4 * scale, 4 * scale);
                        }
                        // Purple corruption
                        ctx.fillStyle = 'rgba(128, 0, 128, 0.3)';
                        ctx.fillRect(x + 6 * scale, y + 6 * scale, 4 * scale, 4 * scale);
                    },
                    soldado: () => {
                        this.drawGlow(ctx, x + 2 * scale, y + 2 * scale, 12 * scale, '#ffff66', 0.3);
                        ctx.fillStyle = '#4a4a4a';
                        ctx.fillRect(x + 2 * scale, y + 4 * scale, 12 * scale, 10 * scale);
                        ctx.fillStyle = '#888';
                        ctx.fillRect(x + 4 * scale, y + 1 * scale, 8 * scale, 3 * scale);
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(x + 6 * scale, y + 2 * scale, 4 * scale, 2 * scale);
                    },
                    loco: () => {
                        this.drawGlow(ctx, x + 4 * scale, y + 4 * scale, 8 * scale, '#ff00ff', 0.5);
                        ctx.fillStyle = '#ff00ff';
                        ctx.fillRect(x + 2 * scale, y + 4 * scale, 12 * scale, 10 * scale);
                        ctx.fillStyle = '#00ffff';
                        ctx.fillRect(x + 4 * scale, y, 8 * scale, 8 * scale);
                        ctx.fillStyle = '#000';
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(x + 4 * scale + i * 3 * scale, y + 2 * scale, 2 * scale, 2 * scale);
                        }
                    },
                    demonio: () => {
                        this.drawGlow(ctx, x + 4 * scale, y + 4 * scale, 8 * scale, '#ff4500', 0.6);
                        ctx.fillStyle = '#ff4500';
                        ctx.fillRect(x + 2 * scale, y + 4 * scale, 12 * scale, 10 * scale);
                        ctx.fillStyle = '#ff6347';
                        ctx.fillRect(x + 4 * scale, y, 8 * scale, 8 * scale);
                        // Cuernos
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 3 * scale, y - 2 * scale, 2 * scale, 3 * scale);
                        ctx.fillRect(x + 11 * scale, y - 2 * scale, 2 * scale, 3 * scale);
                        // Eyes glow
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(x + 5 * scale, y + 3 * scale, 2 * scale, 2 * scale);
                        ctx.fillRect(x + 9 * scale, y + 3 * scale, 2 * scale, 2 * scale);
                    },
                    espectre: () => {
                        this.drawGlow(ctx, x + 6 * scale, y + 4 * scale, 4 * scale, '#4169e1', 0.5);
                        ctx.fillStyle = 'rgba(200, 200, 255, 0.8)';
                        ctx.beginPath();
                        ctx.arc(x + 8 * scale, y + 6 * scale, 7 * scale, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#0000ff';
                        ctx.fillRect(x + 4 * scale, y + 2 * scale, 3 * scale, 3 * scale);
                        ctx.fillRect(x + 9 * scale, y + 2 * scale, 3 * scale, 3 * scale);
                    }
                };

                if (sprites[enemyType]) {
                    sprites[enemyType]();
                }
            }

            static drawBossSprite(ctx, x, y, bossType) {
                const scale = 3;

                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(x + 12 * scale, y + 20 * scale, 10 * scale, 3 * scale, 0, 0, Math.PI * 2);
                ctx.fill();

                const bosses = {
                    capitanBandido: () => {
                        this.drawGlow(ctx, x + 6 * scale, y + 4 * scale, 20 * scale, '#ff4444', 0.8);
                        ctx.fillStyle = '#8b0000';
                        ctx.fillRect(x + 6 * scale, y + 8 * scale, 20 * scale, 16 * scale);
                        ctx.fillStyle = '#ffdbac';
                        ctx.fillRect(x + 8 * scale, y, 16 * scale, 16 * scale);
                        ctx.fillStyle = '#000';
                        ctx.fillRect(x + 10 * scale, y + 4 * scale, 4 * scale, 4 * scale);
                        ctx.fillRect(x + 18 * scale, y + 4 * scale, 4 * scale, 4 * scale);
                        // Sombrero
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x + 6 * scale, y - 2 * scale, 20 * scale, 4 * scale);
                        // Red cape
                        ctx.fillStyle = '#cc0000';
                        ctx.fillRect(x + 4 * scale, y + 10 * scale, 3 * scale, 12 * scale);
                        ctx.fillRect(x + 20 * scale, y + 10 * scale, 3 * scale, 12 * scale);
                    },
                    entAnciano: () => {
                        this.drawGlow(ctx, x + 8 * scale, y + 6 * scale, 16 * scale, '#228b22', 0.7);
                        ctx.fillStyle = '#1a5f1a';
                        ctx.fillRect(x + 8 * scale, y + 8 * scale, 16 * scale, 16 * scale);
                        ctx.fillStyle = '#2d5016';
                        ctx.fillRect(x + 10 * scale, y + 2 * scale, 12 * scale, 8 * scale);
                        ctx.fillStyle = '#228b22';
                        for (let i = 0; i < 6; i++) {
                            ctx.fillRect(x + 10 * scale + i * 2 * scale, y + 2 * scale - 2 * scale, 2 * scale, 3 * scale);
                        }
                    },
                    comandanteCaido: () => {
                        this.drawGlow(ctx, x + 8 * scale, y + 4 * scale, 16 * scale, '#ccaa00', 0.8);
                        ctx.fillStyle = '#4a4a4a';
                        ctx.fillRect(x + 8 * scale, y + 8 * scale, 16 * scale, 16 * scale);
                        ctx.fillStyle = '#c0c0c0';
                        ctx.fillRect(x + 10 * scale, y, 12 * scale, 10 * scale);
                        ctx.fillStyle = '#888';
                        ctx.fillRect(x + 10 * scale, y + 2 * scale, 4 * scale, 3 * scale);
                        ctx.fillRect(x + 18 * scale, y + 2 * scale, 4 * scale, 3 * scale);
                        // Armor accent
                        ctx.fillStyle = '#ffd700';
                        ctx.fillRect(x + 12 * scale, y + 4 * scale, 8 * scale, 2 * scale);
                    },
                    caballerosNi: () => {
                        this.drawGlow(ctx, x + 8 * scale, y + 4 * scale, 16 * scale, '#ff00ff', 0.9);
                        ctx.fillStyle = '#ff00ff';
                        ctx.fillRect(x + 8 * scale, y + 8 * scale, 16 * scale, 16 * scale);
                        ctx.fillStyle = '#00ffff';
                        ctx.fillRect(x + 10 * scale, y, 12 * scale, 10 * scale);
                        ctx.fillStyle = '#ffff00';
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(x + 10 * scale + i * 3 * scale, y + 2 * scale, 2 * scale, 2 * scale);
                        }
                        // Psychedelic patterns
                        ctx.fillStyle = 'rgba(255, 0, 255, 0.5)';
                        ctx.fillRect(x + 10 * scale, y + 10 * scale, 4 * scale, 4 * scale);
                        ctx.fillRect(x + 18 * scale, y + 10 * scale, 4 * scale, 4 * scale);
                    },
                    senorCrisol: () => {
                        this.drawGlow(ctx, x + 8 * scale, y + 4 * scale, 16 * scale, '#ff6600', 1);
                        ctx.fillStyle = '#cc3300';
                        ctx.fillRect(x + 8 * scale, y + 8 * scale, 16 * scale, 16 * scale);
                        ctx.fillStyle = '#ff6600';
                        ctx.fillRect(x + 10 * scale, y + 2 * scale, 12 * scale, 8 * scale);
                        ctx.fillStyle = '#ffaa00';
                        ctx.fillRect(x + 12 * scale, y + 4 * scale, 8 * scale, 4 * scale);
                        // Lava glow eyes
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(x + 12 * scale, y + 4 * scale, 2 * scale, 2 * scale);
                        ctx.fillRect(x + 18 * scale, y + 4 * scale, 2 * scale, 2 * scale);
                    },
                    guardianGrial: () => {
                        this.drawGlow(ctx, x + 8 * scale, y + 4 * scale, 16 * scale, '#ffd700', 1.2);
                        ctx.fillStyle = '#4a4a6a';
                        ctx.fillRect(x + 8 * scale, y + 8 * scale, 16 * scale, 16 * scale);
                        ctx.fillStyle = '#ffd700';
                        ctx.fillRect(x + 10 * scale, y + 2 * scale, 12 * scale, 8 * scale);
                        ctx.fillRect(x + 12 * scale, y + 10 * scale, 8 * scale, 3 * scale);
                        // Holy light
                        ctx.fillStyle = '#ffff99';
                        ctx.beginPath();
                        ctx.arc(x + 16 * scale, y + 12 * scale, 4 * scale, 0, Math.PI * 2);
                        ctx.fill();
                    }
                };

                if (bosses[bossType]) {
                    bosses[bossType]();
                }
            }
        }

        // ==================== CLASES DE ENTIDADES ====================
        class Entity {
            constructor(x, y, type) {
                this.position = new Vector2(x, y);
                this.velocity = new Vector2(0, 0);
                this.width = 16;
                this.height = 16;
                this.type = type;
                this.active = true;
            }

            update(dt) {
                this.position = this.position.add(this.velocity.multiply(dt));
            }

            draw(ctx) {}

            intersects(other) {
                return (
                    this.position.x < other.position.x + other.width &&
                    this.position.x + this.width > other.position.x &&
                    this.position.y < other.position.y + other.height &&
                    this.position.y + this.height > other.position.y
                );
            }
        }

        class Player extends Entity {
            constructor(x, y, classType, index = 0) {
                super(x, y, 'player');
                this.classType = classType;
                this.index = index;
                this.classStats = CHARACTER_CLASSES[classType];
                this.hp = this.classStats.maxHp;
                this.maxHp = this.classStats.maxHp;
                this.energy = 100;
                this.maxEnergy = 100;
                this.facing = new Vector2(0, 1); // dirección a la que mira
                this.attackCooldown = 0;
                this.specialCooldown = 0;
                this.isDodging = false;
                this.dodgeTimer = 0;
                this.invulnerableTimer = 0;
                this.comboCounter = 0;
                this.lastHitTime = 0;
                // Animaciones
                this.attackAnimTimer = 0; // duración visual del ataque
                this.specialAnimTimer = 0;
                this.attackRotation = 0; // rotación para swing de espada
                this.pendingProjectiles = []; // proyectiles pendientes de enviar
                // Progresión
                this.coins = 0;
                this.level = 1;
            }

            handleInput(inputState) {
                const speed = this.classStats.speed;
                this.velocity = new Vector2(0, 0);

                if (inputState.up) this.velocity.y -= speed;
                if (inputState.down) this.velocity.y += speed;
                if (inputState.left) this.velocity.x -= speed;
                if (inputState.right) this.velocity.x += speed;

                // Actualizar dirección de cara
                if (this.velocity.length() > 0) {
                    this.facing = this.velocity.normalize();
                }

                if (inputState.attack && this.attackCooldown <= 0) {
                    this.performAttack();
                }

                if (inputState.special && this.specialCooldown <= 0 && this.energy >= this.classStats.specialCost) {
                    this.performSpecial();
                }

                if (inputState.dodge && !this.isDodging) {
                    this.dodge();
                }
            }

            performAttack() {
                this.attackCooldown = 0.35;
                this.attackAnimTimer = 0.25;
                this.attackRotation = 0;
                audioSystem.playSfx('attack');

                const cx = this.position.x + 16;
                const cy = this.position.y + 16;

                if (this.classType === 'CABALLERO') {
                    // Espada: arco amplio melee
                    const baseAngle = Math.atan2(this.facing.y, this.facing.x);
                    for (let a = -0.6; a <= 0.6; a += 0.3) {
                        const angle = baseAngle + a;
                        const vel = new Vector2(Math.cos(angle), Math.sin(angle)).multiply(350);
                        const p = new Projectile(cx + Math.cos(angle) * 10, cy + Math.sin(angle) * 10, vel, this.classStats.attack, 'player');
                        p.lifetime = 0.15; p.projColor = '#ffaa00'; p.projSize = 6;
                        this.pendingProjectiles.push(p);
                    }
                    particleSystem.burst(cx + this.facing.x * 20, cy + this.facing.y * 20, 6, 120, 0.2, ['#ffaa00', '#ff6600']);

                } else if (this.classType === 'MAGO') {
                    // Bola mágica: proyectil a distancia
                    const vel = new Vector2(this.facing.x, this.facing.y).multiply(500);
                    const p = new Projectile(cx, cy, vel, this.classStats.attack, 'player');
                    p.lifetime = 1.5; p.projColor = '#66ccff'; p.projSize = 7;
                    this.pendingProjectiles.push(p);
                    particleSystem.burst(cx, cy, 4, 80, 0.15, ['#66ccff', '#aaeeff']);

                } else if (this.classType === 'PICARO') {
                    // Dagas rápidas: 3 proyectiles en ráfaga
                    this.attackCooldown = 0.2; // más rápido
                    const baseAngle = Math.atan2(this.facing.y, this.facing.x);
                    for (let i = -1; i <= 1; i++) {
                        const angle = baseAngle + i * 0.15;
                        const vel = new Vector2(Math.cos(angle), Math.sin(angle)).multiply(550);
                        const p = new Projectile(cx, cy, vel, this.classStats.attack * 0.7, 'player');
                        p.lifetime = 0.4; p.projColor = '#88ff88'; p.projSize = 4;
                        this.pendingProjectiles.push(p);
                    }
                    particleSystem.burst(cx, cy, 3, 100, 0.1, ['#88ff88', '#44cc44']);

                } else if (this.classType === 'CLERIGO') {
                    // Golpe sagrado: proyectil medio
                    const vel = new Vector2(this.facing.x, this.facing.y).multiply(400);
                    const p = new Projectile(cx, cy, vel, this.classStats.attack, 'player');
                    p.lifetime = 0.8; p.projColor = '#ffffaa'; p.projSize = 6;
                    this.pendingProjectiles.push(p);
                    particleSystem.burst(cx, cy, 4, 80, 0.2, ['#ffffaa', '#ffffff']);
                }
            }

            performSpecial() {
                this.specialCooldown = 1.5;
                this.energy -= this.classStats.specialCost;
                this.specialAnimTimer = 0.5;
                audioSystem.playSfx('special');

                const cx = this.position.x + 16;
                const cy = this.position.y + 16;

                if (this.classType === 'CABALLERO') {
                    // Torbellino: proyectiles en todas direcciones
                    for (let i = 0; i < 12; i++) {
                        const angle = (i / 12) * Math.PI * 2;
                        const vel = new Vector2(Math.cos(angle), Math.sin(angle)).multiply(300);
                        const p = new Projectile(cx, cy, vel, this.classStats.specialDamage, 'player');
                        p.lifetime = 0.3; p.projColor = '#ff6600'; p.projSize = 7;
                        this.pendingProjectiles.push(p);
                    }
                    particleSystem.burst(cx, cy, 20, 180, 0.5, ['#ff6600', '#ffaa00', '#ffcc00']);

                } else if (this.classType === 'MAGO') {
                    // Bola de fuego: proyectil grande explosivo
                    const vel = new Vector2(this.facing.x, this.facing.y).multiply(350);
                    const p = new Projectile(cx, cy, vel, this.classStats.specialDamage, 'player');
                    p.lifetime = 2; p.projColor = '#ff4400'; p.projSize = 12;
                    this.pendingProjectiles.push(p);
                    // Proyectiles laterales
                    for (let a = -0.4; a <= 0.4; a += 0.2) {
                        const baseAngle = Math.atan2(this.facing.y, this.facing.x) + a;
                        const svel = new Vector2(Math.cos(baseAngle), Math.sin(baseAngle)).multiply(300);
                        const sp = new Projectile(cx, cy, svel, this.classStats.specialDamage * 0.5, 'player');
                        sp.lifetime = 1; sp.projColor = '#ff8844'; sp.projSize = 6;
                        this.pendingProjectiles.push(sp);
                    }
                    particleSystem.burst(cx, cy, 15, 150, 0.5, ['#ff4400', '#ff8800', '#ffcc00']);

                } else if (this.classType === 'PICARO') {
                    // Lluvia de dagas: muchos proyectiles rápidos en abanico
                    const baseAngle = Math.atan2(this.facing.y, this.facing.x);
                    for (let i = 0; i < 8; i++) {
                        const angle = baseAngle + (i - 3.5) * 0.2;
                        const vel = new Vector2(Math.cos(angle), Math.sin(angle)).multiply(600);
                        const p = new Projectile(cx, cy, vel, this.classStats.specialDamage, 'player');
                        p.lifetime = 0.5; p.projColor = '#00ff88'; p.projSize = 5;
                        this.pendingProjectiles.push(p);
                    }
                    particleSystem.burst(cx, cy, 12, 200, 0.3, ['#00ff88', '#88ffcc']);

                } else if (this.classType === 'CLERIGO') {
                    // Curación en área: sana a todos los jugadores cercanos + ataque divino
                    this.healAllNearby = true; // flag para el gameplay loop
                    this.healAmount = 30; // Heal 30 HP
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const vel = new Vector2(Math.cos(angle), Math.sin(angle)).multiply(200);
                        const p = new Projectile(cx, cy, vel, 15, 'player');
                        p.lifetime = 0.5; p.projColor = '#ffffff'; p.projSize = 5;
                        this.pendingProjectiles.push(p);
                    }
                    particleSystem.burst(cx, cy, 25, 200, 0.6, ['#ffffff', '#ffffaa', '#ffff66']);
                }
            }

            dodge() {
                this.isDodging = true;
                this.dodgeTimer = 0.3;
                this.invulnerableTimer = 0.3;
                // Dash en la dirección de cara
                this.position.x += this.facing.x * 60;
                this.position.y += this.facing.y * 60;
                audioSystem.playSfx('dodge');
                particleSystem.burst(this.position.x, this.position.y, 8, 150, 0.3, ['#ccccff', '#6666ff']);
            }

            takeDamage(amount) {
                if (this.isDodging || this.invulnerableTimer > 0) return;
                const def = this.classStats.defense;
                const realDamage = Math.max(1, amount - def * 0.3);
                this.hp = Math.max(0, this.hp - realDamage);
                this.invulnerableTimer = 0.5;
                audioSystem.playSfx('hit');
                if (this.hp <= 0) audioSystem.playSfx('death');
                particleSystem.burst(this.position.x + 16, this.position.y + 16, 6, 100, 0.4, ['#ff6666', '#ff0000']);
            }

            heal(amount) {
                this.hp = Math.min(this.maxHp, this.hp + amount);
                particleSystem.burst(this.position.x + 16, this.position.y + 16, 5, 80, 0.3, ['#00ff66', '#aaffaa']);
            }

            addCoins(amount) {
                const adjusted = Math.floor(amount * globalDifficulty.coinMultiplier);
                this.coins += adjusted;
            }

            getLevelCost(targetLevel) {
                const costs = [0, 10, 20, 35, 55, 80, 110, 150, 200, 300];
                return targetLevel < costs.length ? costs[targetLevel] : 999;
            }

            levelUp() {
                if (this.level >= 10) return false;
                const cost = this.getLevelCost(this.level + 1);
                if (this.coins < cost) return false;

                this.coins -= cost;
                this.level++;

                // Aplicar bonificaciones
                const hpMultiplier = Math.pow(1.05, 1); // +5%
                const atkMultiplier = 1.05;
                const defMultiplier = 1.03;
                const spdMultiplier = 1.02;

                this.maxHp = Math.floor(this.maxHp * hpMultiplier);
                this.hp = this.maxHp;
                this.classStats.attack = Math.floor(this.classStats.attack * atkMultiplier);
                this.classStats.defense = Math.floor(this.classStats.defense * defMultiplier);
                this.classStats.speed = Math.floor(this.classStats.speed * spdMultiplier);

                audioSystem.playSfx('levelup');
                return true;
            }

            recordHit() {
                this.lastHitTime = 0.8;
                this.comboCounter++;
            }

            resetCombo() {
                this.comboCounter = 0;
            }

            update(dt) {
                super.update(dt);

                this.attackCooldown = Math.max(0, this.attackCooldown - dt);
                this.specialCooldown = Math.max(0, this.specialCooldown - dt);
                this.attackAnimTimer = Math.max(0, this.attackAnimTimer - dt);
                this.specialAnimTimer = Math.max(0, this.specialAnimTimer - dt);
                this.lastHitTime = Math.max(0, this.lastHitTime - dt);

                if (this.lastHitTime <= 0) this.resetCombo();

                if (this.isDodging) {
                    this.dodgeTimer -= dt;
                    if (this.dodgeTimer <= 0) this.isDodging = false;
                }

                this.invulnerableTimer = Math.max(0, this.invulnerableTimer - dt);
                this.energy = Math.min(this.maxEnergy, this.energy + dt * 25);

                // Rotación de animación de ataque
                if (this.attackAnimTimer > 0) {
                    this.attackRotation += dt * 20;
                }

                // Limitar movimiento al canvas
                this.position.x = Math.max(0, Math.min(CONFIG.CANVAS_WIDTH - 32, this.position.x));
                this.position.y = Math.max(0, Math.min(CONFIG.CANVAS_HEIGHT - 32, this.position.y));
            }

            draw(ctx) {
                const cx = this.position.x + 16;
                const cy = this.position.y + 16;

                // Sombra
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(cx, this.position.y + 34, 12, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Invulnerabilidad parpadeo
                if (this.invulnerableTimer > 0 && Math.sin(this.invulnerableTimer * 20) > 0) {
                    ctx.globalAlpha = 0.4;
                }

                // Dodge flash
                if (this.isDodging) {
                    ctx.globalAlpha = 0.3;
                }

                // Dibujar sprite del personaje
                SpriteRenderer.drawPlayerSprite(ctx, this.position.x, this.position.y, this.classType, 'down', this.attackAnimTimer > 0);

                ctx.globalAlpha = 1;

                // === ANIMACIONES DE ATAQUE ===
                if (this.attackAnimTimer > 0) {
                    const angle = Math.atan2(this.facing.y, this.facing.x);
                    ctx.save();
                    ctx.translate(cx, cy);

                    if (this.classType === 'CABALLERO') {
                        // Arco de espada giratorio
                        ctx.rotate(angle + this.attackRotation);
                        ctx.strokeStyle = '#ffaa00';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.arc(0, 0, 28, -0.8, 0.8);
                        ctx.stroke();
                        ctx.strokeStyle = '#ffcc44';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(8, 0);
                        ctx.lineTo(30, 0);
                        ctx.stroke();

                    } else if (this.classType === 'MAGO') {
                        // Orbe mágico brillando en la punta del staff
                        const orbX = this.facing.x * 22;
                        const orbY = this.facing.y * 22;
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.fillStyle = '#66ccff';
                        ctx.beginPath();
                        ctx.arc(orbX, orbY, 8 + Math.sin(this.attackRotation * 3) * 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalCompositeOperation = 'source-over';

                    } else if (this.classType === 'PICARO') {
                        // Dagas cruzadas rápidas
                        const t = this.attackRotation;
                        ctx.strokeStyle = '#88ff88';
                        ctx.lineWidth = 3;
                        ctx.rotate(angle);
                        ctx.beginPath();
                        ctx.moveTo(5, -8); ctx.lineTo(25, 0); ctx.lineTo(5, 8);
                        ctx.stroke();
                        ctx.rotate(t * 2);
                        ctx.beginPath();
                        ctx.moveTo(5, -5); ctx.lineTo(20, 0); ctx.lineTo(5, 5);
                        ctx.stroke();

                    } else if (this.classType === 'CLERIGO') {
                        // Brillo sagrado
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.fillStyle = 'rgba(255, 255, 200, 0.4)';
                        ctx.beginPath();
                        ctx.arc(this.facing.x * 18, this.facing.y * 18, 14, 0, Math.PI * 2);
                        ctx.fill();
                        // Cruz
                        ctx.strokeStyle = '#ffffaa';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(this.facing.x * 18 - 6, this.facing.y * 18);
                        ctx.lineTo(this.facing.x * 18 + 6, this.facing.y * 18);
                        ctx.moveTo(this.facing.x * 18, this.facing.y * 18 - 6);
                        ctx.lineTo(this.facing.x * 18, this.facing.y * 18 + 6);
                        ctx.stroke();
                        ctx.globalCompositeOperation = 'source-over';
                    }

                    ctx.restore();
                }

                // Animación especial (anillo de poder)
                if (this.specialAnimTimer > 0) {
                    const radius = 30 + (0.5 - this.specialAnimTimer) * 60;
                    const alpha = this.specialAnimTimer;
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = this.classStats.glowColor;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            getAttackProjectiles() {
                const projs = [...this.pendingProjectiles];
                this.pendingProjectiles = [];
                return projs;
            }
        }

        class Enemy extends Entity {
            constructor(x, y, type) {
                super(x, y, 'enemy');
                this.enemyType = type;
                this.hp = 20;
                this.maxHp = 20;
                this.speed = 100;
                this.damage = 5;
                this.attackRange = 200;
                this.attackCooldown = 0;
                this.moveTimer = 0;
                this.moveDirection = new Vector2(Math.random() - 0.5, Math.random() - 0.5).normalize();
            }

            update(dt, players) {
                this.moveTimer -= dt;
                if (this.moveTimer <= 0) {
                    this.moveDirection = new Vector2(Math.random() - 0.5, Math.random() - 0.5).normalize();
                    this.moveTimer = 2;
                }

                // Buscar jugador más cercano
                let closestPlayer = null;
                let closestDistance = this.attackRange;

                for (let player of players) {
                    const dist = this.position.distance(player.position);
                    if (dist < closestDistance) {
                        closestDistance = dist;
                        closestPlayer = player;
                    }
                }

                if (closestPlayer) {
                    const dir = closestPlayer.position.subtract(this.position).normalize();
                    this.velocity = dir.multiply(this.speed);
                } else {
                    this.velocity = this.moveDirection.multiply(this.speed);
                }

                this.position = this.position.add(this.velocity.multiply(dt));

                // Limitar al canvas
                this.position.x = Math.max(0, Math.min(CONFIG.CANVAS_WIDTH - this.width, this.position.x));
                this.position.y = Math.max(0, Math.min(CONFIG.CANVAS_HEIGHT - this.height, this.position.y));

                this.attackCooldown = Math.max(0, this.attackCooldown - dt);
            }

            draw(ctx) {
                SpriteRenderer.drawEnemySprite(ctx, this.position.x, this.position.y, this.enemyType);

                // Fancy HP bar with gradient
                const barWidth = 20;
                const barHeight = 4;
                const x = this.position.x + (this.width - barWidth) / 2;
                const y = this.position.y - 8;

                // Background
                ctx.fillStyle = '#000';
                ctx.fillRect(x - 1, y - 1, barWidth + 2, barHeight + 2);

                // HP gradient (green to red)
                const healthPercent = this.hp / this.maxHp;
                const hueColor = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';
                ctx.fillStyle = hueColor;
                ctx.fillRect(x, y, (healthPercent) * barWidth, barHeight);

                // Border
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(x - 1, y - 1, barWidth + 2, barHeight + 2);
            }

            takeDamage(amount) {
                this.hp = Math.max(0, this.hp - amount);
                audioSystem.playSfx('enemyHit');
                particleSystem.burst(this.position.x + 16, this.position.y + 16, 4, 80, 0.3, ['#ffffff', '#ffaaaa']);
            }

            isDefeated() {
                return this.hp <= 0;
            }
        }

        class Boss extends Entity {
            constructor(x, y, type, zone) {
                super(x, y, 'boss');
                this.bossType = type;
                this.zone = zone;
                this.width = 48;
                this.height = 48;
                this.glowPulse = 0;

                const bossStats = {
                    capitanBandido: { hp: 80, damage: 12, speed: 100 },
                    entAnciano: { hp: 100, damage: 15, speed: 70 },
                    comandanteCaido: { hp: 120, damage: 16, speed: 90 },
                    caballerosNi: { hp: 90, damage: 10, speed: 130 },
                    senorCrisol: { hp: 140, damage: 18, speed: 90 },
                    guardianGrial: { hp: 180, damage: 20, speed: 100 }
                };

                const stats = bossStats[type];
                this.hp = stats.hp;
                this.maxHp = stats.hp;
                this.damage = stats.damage;
                this.speed = stats.speed;
                this.attackCooldown = 0;
                this.patternTimer = 0;
                this.patternIndex = 0;
            }

            update(dt, players) {
                this.patternTimer += dt;
                this.glowPulse += dt * 3;
                this.attackCooldown = Math.max(0, this.attackCooldown - dt);

                // Patrón de ataque específico del boss
                if (this.patternTimer > 2) {
                    this.patternTimer = 0;
                    this.patternIndex = (this.patternIndex + 1) % 3;
                }

                // Seguimiento básico
                if (players.length > 0) {
                    const targetPlayer = players[0];
                    const dist = this.position.distance(targetPlayer.position);
                    if (dist > 50) {
                        const dir = targetPlayer.position.subtract(this.position).normalize();
                        this.velocity = dir.multiply(this.speed);
                    } else {
                        this.velocity = new Vector2(0, 0);
                    }
                }

                this.position = this.position.add(this.velocity.multiply(dt));

                // Limitar al canvas
                this.position.x = Math.max(0, Math.min(CONFIG.CANVAS_WIDTH - this.width, this.position.x));
                this.position.y = Math.max(0, Math.min(CONFIG.CANVAS_HEIGHT - this.height, this.position.y));
            }

            draw(ctx) {
                // Pulsating glow behind boss
                const glowStrength = 0.5 + Math.sin(this.glowPulse) * 0.3;
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = glowStrength * 0.4;
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(this.position.x + 24, this.position.y + 24, 60, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';

                SpriteRenderer.drawBossSprite(ctx, this.position.x, this.position.y, this.bossType);

                // Enhanced boss HP bar with name
                const barWidth = 240;
                const barHeight = 12;
                const x = CONFIG.CANVAS_WIDTH / 2 - barWidth / 2;
                const y = 15;

                // Background with border
                ctx.fillStyle = '#000';
                ctx.fillRect(x - 2, y - 2, barWidth + 4, barHeight + 4);

                // HP gradient (red to yellow to green)
                const healthPercent = Math.max(0, this.hp / this.maxHp);
                const hueColor = healthPercent > 0.5 ? '#ff0000' : healthPercent > 0.25 ? '#ffff00' : '#ff6600';
                ctx.fillStyle = hueColor;
                ctx.fillRect(x, y, (healthPercent) * barWidth, barHeight);

                // Golden border
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, barWidth, barHeight);

                // Skull icons
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('☠', x - 20, y + 8);
                ctx.fillText('☠', x + barWidth + 20, y + 8);

                // Boss name
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('BOSS', CONFIG.CANVAS_WIDTH / 2, y - 10);
            }

            takeDamage(amount) {
                this.hp = Math.max(0, this.hp - amount);
                audioSystem.playSfx('enemyHit');
                if (this.hp <= this.maxHp * 0.1) {
                    particleSystem.burst(this.position.x + 24, this.position.y + 24, 12, 120, 0.5, ['#ff4444', '#ff6666']);
                }
            }

            isDefeated() {
                return this.hp <= 0;
            }

            getAttackPattern(dt) {
                const projectiles = [];
                if (this.attackCooldown <= 0) {
                    this.attackCooldown = 1.5;
                    const angles = this.patternIndex === 0 ? 8 : this.patternIndex === 1 ? 12 : 16;
                    for (let i = 0; i < angles; i++) {
                        const angle = (i / angles) * Math.PI * 2;
                        const vel = new Vector2(Math.cos(angle), Math.sin(angle))
                            .normalize()
                            .multiply(250);
                        projectiles.push(new Projectile(
                            this.position.x + 24,
                            this.position.y + 24,
                            vel,
                            this.damage,
                            'enemy'
                        ));
                    }
                }
                return projectiles;
            }
        }

        class Projectile extends Entity {
            constructor(x, y, velocity, damage, owner) {
                super(x, y, 'projectile');
                this.velocity = velocity;
                this.damage = damage;
                this.owner = owner;
                this.lifetime = 3;
                this.projColor = owner === 'player' ? '#ffff00' : '#ff3333';
                this.projSize = 5;
                this.width = 10;
                this.height = 10;
            }

            update(dt) {
                super.update(dt);
                this.lifetime -= dt;

                if (this.lifetime <= 0) {
                    this.active = false;
                }

                // Out of bounds
                if (this.position.x < -20 || this.position.x > CONFIG.CANVAS_WIDTH + 20 ||
                    this.position.y < -20 || this.position.y > CONFIG.CANVAS_HEIGHT + 20) {
                    this.active = false;
                }
            }

            draw(ctx) {
                const s = this.projSize;
                // Glow trail
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = this.projColor;
                ctx.beginPath();
                ctx.arc(this.position.x, this.position.y, s + 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';

                // Core
                ctx.fillStyle = this.projColor;
                ctx.beginPath();
                ctx.arc(this.position.x, this.position.y, s, 0, Math.PI * 2);
                ctx.fill();

                // Bright center
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.position.x, this.position.y, s * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== SISTEMA DE MAPAS ====================
        class GameMap {
            constructor(width, height, theme) {
                this.width = width;
                this.height = height;
                this.theme = theme;
                this.tileSize = CONFIG.TILE_SIZE;
                this.tiles = [];
                this.time = 0;
                this.generateMap();
            }

            generateMap() {
                for (let y = 0; y < this.height; y++) {
                    this.tiles[y] = [];
                    for (let x = 0; x < this.width; x++) {
                        this.tiles[y][x] = Math.floor(Math.random() * 2);
                    }
                }
            }

            getTileColor(theme, tileValue, x, y, time) {
                switch (theme) {
                    case 'village':
                        if (tileValue === 0) return '#3d8e35';
                        return '#228b22';
                    case 'forest':
                        if (tileValue === 0) return '#1a4d1a';
                        return '#0d2d0d';
                    case 'fortress':
                        if (tileValue === 0) return '#666666';
                        return '#444444';
                    case 'chaos':
                        const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff00ff', '#00ffff'];
                        const cycle = Math.floor((time * 2 + x + y) % colors.length);
                        return colors[cycle];
                    case 'volcano':
                        if (tileValue === 0) return '#8b4513';
                        return '#cc3300';
                    case 'temple':
                        if (tileValue === 0) return '#e6d5b8';
                        return '#d4af37';
                    default:
                        return '#999';
                }
            }

            update(dt) {
                this.time += dt;
            }

            draw(ctx) {
                // Theme-based ambient lighting tint
                const tints = {
                    'village': { r: 0, g: 20, b: 0 },
                    'forest': { r: 0, g: 10, b: 5 },
                    'fortress': { r: 10, g: 10, b: 10 },
                    'chaos': { r: 20, g: 0, b: 20 },
                    'volcano': { r: 30, g: 10, b: 0 },
                    'temple': { r: 15, g: 12, b: 0 }
                };

                const tint = tints[this.theme] || { r: 0, g: 0, b: 0 };
                ctx.fillStyle = `rgb(${tint.r}, ${tint.g}, ${tint.b})`;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                // Draw tiles
                for (let y = 0; y < this.height; y++) {
                    for (let x = 0; x < this.width; x++) {
                        const tileValue = this.tiles[y][x];
                        const color = this.getTileColor(this.theme, tileValue, x, y, this.time);
                        ctx.fillStyle = color;
                        ctx.fillRect(x * this.tileSize, y * this.tileSize, this.tileSize, this.tileSize);

                        // Tile details and animations
                        if (this.theme === 'village' && tileValue === 0) {
                            // Grass details
                            ctx.fillStyle = '#2d6b2d';
                            ctx.fillRect(x * this.tileSize + 8, y * this.tileSize + 8, 4, 4);
                            ctx.fillRect(x * this.tileSize + 20, y * this.tileSize + 20, 4, 4);
                        } else if (this.theme === 'forest' && tileValue === 1) {
                            // Mossy details
                            ctx.fillStyle = 'rgba(100, 200, 100, 0.3)';
                            ctx.fillRect(x * this.tileSize + 4, y * this.tileSize + 4, 8, 8);
                        } else if (this.theme === 'fortress') {
                            // Stone brick pattern
                            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x * this.tileSize, y * this.tileSize, this.tileSize, this.tileSize);
                        } else if (this.theme === 'volcano' && tileValue === 1) {
                            // Lava glow
                            ctx.fillStyle = 'rgba(255, 100, 0, 0.4)';
                            ctx.fillRect(x * this.tileSize + 6, y * this.tileSize + 6, 20, 20);
                        } else if (this.theme === 'temple') {
                            // Crystal shine
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                            ctx.fillRect(x * this.tileSize + 2, y * this.tileSize + 2, 4, 4);
                        }
                    }
                }

                // Draw ambient zone particles
                if (this.theme === 'village') {
                    const leafY = (this.time * 30) % CONFIG.CANVAS_HEIGHT;
                    for (let i = 0; i < 5; i++) {
                        const x = (i * 256 + this.time * 20) % CONFIG.CANVAS_WIDTH;
                        ctx.fillStyle = 'rgba(100, 200, 50, 0.3)';
                        ctx.beginPath();
                        ctx.arc(x, leafY + i * 144, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (this.theme === 'forest') {
                    // Fireflies
                    for (let i = 0; i < 8; i++) {
                        const x = CONFIG.CANVAS_WIDTH * Math.sin(this.time + i) * 0.5 + CONFIG.CANVAS_WIDTH / 2 + i * 100;
                        const y = CONFIG.CANVAS_HEIGHT * Math.sin(this.time * 0.7 + i) * 0.3 + CONFIG.CANVAS_HEIGHT / 2 + i * 40;
                        ctx.fillStyle = i % 2 === 0 ? 'rgba(0, 255, 100, 0.6)' : 'rgba(200, 100, 200, 0.4)';
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (this.theme === 'volcano') {
                    // Heat waves
                    for (let i = 0; i < 10; i++) {
                        const y = (i * 72 + this.time * 50) % CONFIG.CANVAS_HEIGHT;
                        ctx.globalAlpha = 0.1;
                        ctx.strokeStyle = '#ff8800';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        for (let x = 0; x < CONFIG.CANVAS_WIDTH; x += 20) {
                            ctx.lineTo(x, y + Math.sin(this.time * 3 + x * 0.02) * 5);
                        }
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                } else if (this.theme === 'temple') {
                    // Divine light rays
                    for (let i = 0; i < 4; i++) {
                        const x = CONFIG.CANVAS_WIDTH * (0.2 + i * 0.2);
                        ctx.globalAlpha = 0.15;
                        ctx.fillStyle = '#ffff99';
                        ctx.fillRect(x - 10, 0, 20, CONFIG.CANVAS_HEIGHT);
                    }
                    ctx.globalAlpha = 1;
                }
            }
        }

        class Zone {
            constructor(index, name, description, theme, enemyTypes, bossType, loreData = {}) {
                this.index = index;
                this.name = name;
                this.description = description;
                this.theme = theme;
                this.enemyTypes = enemyTypes;
                this.bossType = bossType;
                this.map = new GameMap(40, 22, theme);
                this.enemies = [];
                this.boss = null;
                this.projectiles = [];
                this.spawnTimer = 0;
                this.spawned = false;
                this.defeated = false;
                this.screenShake = 0;
                this.damageFlash = 0;
                this.loreData = loreData;
                this.floatingTexts = [];
                // Zone scaling multipliers
                this.zoneScaleMultipliers = [1.0, 1.3, 1.6, 2.0, 2.5, 3.0];
            }

            getZoneEnemyMultiplier() {
                return this.zoneScaleMultipliers[Math.min(this.index, 5)];
            }

            spawnEnemies() {
                const diffBonus = globalDifficulty.enemyCountBonus;
                const baseCount = 3 + this.index * 2 + diffBonus;
                for (let i = 0; i < baseCount; i++) {
                    const x = Math.random() * (CONFIG.CANVAS_WIDTH - 32) + 16;
                    const y = Math.random() * (CONFIG.CANVAS_HEIGHT - 32) + 16;
                    const type = this.enemyTypes[Math.floor(Math.random() * this.enemyTypes.length)];
                    const enemy = new Enemy(x, y, type);
                    // Apply difficulty and zone multipliers
                    const totalHpMult = globalDifficulty.enemyHpMultiplier * this.getZoneEnemyMultiplier();
                    const totalDmgMult = globalDifficulty.enemyDamageMultiplier * this.getZoneEnemyMultiplier();
                    const totalSpdMult = globalDifficulty.enemySpeedMultiplier;
                    enemy.maxHp = Math.floor(enemy.maxHp * totalHpMult);
                    enemy.hp = enemy.maxHp;
                    enemy.damage = Math.floor(enemy.damage * totalDmgMult);
                    enemy.speed = Math.floor(enemy.speed * totalSpdMult);
                    this.enemies.push(enemy);
                }
            }

            spawnBoss() {
                this.boss = new Boss(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, this.bossType, this.index);
                // Apply zone scaling to boss
                const zoneMultiplier = this.getZoneEnemyMultiplier();
                const totalHpMult = globalDifficulty.enemyHpMultiplier * zoneMultiplier;
                const totalDmgMult = globalDifficulty.enemyDamageMultiplier * zoneMultiplier;
                const totalSpdMult = globalDifficulty.enemySpeedMultiplier;
                this.boss.maxHp = Math.floor(this.boss.maxHp * totalHpMult);
                this.boss.hp = this.boss.maxHp;
                this.boss.damage = Math.floor(this.boss.damage * totalDmgMult);
                this.boss.speed = Math.floor(this.boss.speed * totalSpdMult);
            }

            update(dt, players) {
                this.map.update(dt);
                this.screenShake = Math.max(0, this.screenShake - dt * 5);
                this.damageFlash = Math.max(0, this.damageFlash - dt * 3);

                if (!this.spawned) {
                    this.spawnEnemies();
                    this.spawned = true;
                }

                // Actualizar enemigos
                this.enemies = this.enemies.filter(e => e.active);
                for (let enemy of this.enemies) {
                    enemy.update(dt, players);
                }

                // Spawn boss when all regular enemies are defeated
                if (!this.boss && this.enemies.length === 0 && this.spawned) {
                    this.spawnBoss();
                }

                // Actualizar boss
                if (this.boss) {
                    this.boss.update(dt, players);
                    const bossProjectiles = this.boss.getAttackPattern(dt);
                    this.projectiles.push(...bossProjectiles);
                }

                // Actualizar proyectiles
                this.projectiles = this.projectiles.filter(p => p.active);
                for (let proj of this.projectiles) {
                    proj.update(dt);
                }

                // Spawn más enemigos solo si el boss aún no ha aparecido
                this.spawnTimer += dt;
                if (!this.boss && this.spawnTimer > 5 && this.enemies.length < 3 + this.index && this.enemies.length > 0) {
                    const x = Math.random() * (CONFIG.CANVAS_WIDTH - 32) + 16;
                    const y = Math.random() * (CONFIG.CANVAS_HEIGHT - 32) + 16;
                    const type = this.enemyTypes[Math.floor(Math.random() * this.enemyTypes.length)];
                    this.enemies.push(new Enemy(x, y, type));
                    this.spawnTimer = 0;
                }

                // Detección de colisiones y daño (pausado durante cinemática de boss)
                if (!this.bossDeathTimer) {
                    for (let player of players) {
                        // Con enemigos
                        for (let enemy of this.enemies) {
                            if (player.intersects(enemy) && player.invulnerableTimer <= 0) {
                                player.takeDamage(enemy.damage);
                                this.screenShake = 0.1;
                                this.damageFlash = 0.15;
                            }
                        }

                        // Con boss
                        if (this.boss && player.intersects(this.boss) && player.invulnerableTimer <= 0) {
                            player.takeDamage(this.boss.damage);
                            this.screenShake = 0.2;
                            this.damageFlash = 0.2;
                        }
                    }
                }

                // Daño de proyectiles
                for (let proj of this.projectiles) {
                    if (proj.owner === 'player') {
                        for (let enemy of this.enemies) {
                            if (proj.intersects(enemy)) {
                                enemy.takeDamage(proj.damage);
                                proj.active = false;
                                particleSystem.burst(proj.position.x, proj.position.y, 8, 100, 0.3, ['#ffff00', '#ffaa00']);
                            }
                        }
                        if (this.boss && proj.intersects(this.boss)) {
                            this.boss.takeDamage(proj.damage);
                            proj.active = false;
                            particleSystem.burst(proj.position.x, proj.position.y, 12, 120, 0.4, ['#ffff00', '#ffaa00', '#ff6600']);
                            this.screenShake = 0.15;
                        }
                    } else {
                        for (let p of players) {
                            if (proj.intersects(p) && p.invulnerableTimer <= 0 && !p.isDodging) {
                                p.takeDamage(proj.damage);
                                proj.active = false;
                                this.damageFlash = 0.2;
                                particleSystem.burst(proj.position.x, proj.position.y, 6, 100, 0.3, ['#ff0000', '#ff6666']);
                            }
                        }
                    }
                }

                // Remover enemigos derrotados y generar monedas
                for (let enemy of this.enemies.filter(e => e.isDefeated())) {
                    particleSystem.burst(enemy.position.x, enemy.position.y, 12, 150, 0.5, ['#ff8800', '#ffcc00']);
                    // Drop coins
                    const coinAmount = 1 + Math.floor(Math.random() * 3);
                    const closestPlayer = players.reduce((closest, p) => {
                        const d1 = p.position.distance(enemy.position);
                        const d2 = closest.position.distance(enemy.position);
                        return d1 < d2 ? p : closest;
                    });
                    closestPlayer.addCoins(coinAmount);
                    this.floatingTexts.push(new FloatingText(enemy.position.x, enemy.position.y, `+${coinAmount}`, '#ffd700', 1));
                }
                this.enemies = this.enemies.filter(e => !e.isDefeated());

                // Verificar si boss fue derrotado
                if (this.boss && this.boss.isDefeated() && !this.bossDeathTimer) {
                    this.bossDeathTimer = 2.5;
                    this.bossDeathPos = { x: this.boss.position.x + 24, y: this.boss.position.y + 24 };
                    this.bossDeathPhase = 0;
                    // Initial explosion
                    particleSystem.burst(this.bossDeathPos.x, this.bossDeathPos.y, 60, 250, 1.0, ['#ffff00', '#ff8800', '#ff0000']);
                    audioSystem.playSfx('victory');
                    // Boss coins distributed to all living players
                    const coinAmount = 15 + Math.floor(Math.random() * 11);
                    const livingPlayers = players.filter(p => p.hp > 0);
                    if (livingPlayers.length > 0) {
                        const coinsPerPlayer = Math.floor(coinAmount / livingPlayers.length);
                        for (let p of livingPlayers) {
                            p.addCoins(coinsPerPlayer);
                            this.floatingTexts.push(new FloatingText(p.position.x, p.position.y, `+${coinsPerPlayer}`, '#ffff00', 1));
                        }
                    }
                }

                // Boss death cinematic
                if (this.bossDeathTimer && this.bossDeathTimer > 0) {
                    this.bossDeathTimer -= dt;
                    this.bossDeathPhase += dt;

                    // Screen shake during death
                    this.screenShake = Math.min(1, this.bossDeathTimer / 2);

                    // Chain explosions at random offsets
                    if (Math.random() < 0.3) {
                        const ox = (Math.random() - 0.5) * 80;
                        const oy = (Math.random() - 0.5) * 80;
                        const colors = [
                            ['#ffff00', '#ffaa00', '#ff6600'],
                            ['#ffffff', '#ffddaa', '#ff8800'],
                            ['#ff4444', '#ff8800', '#ffcc00']
                        ];
                        const c = colors[Math.floor(Math.random() * colors.length)];
                        particleSystem.burst(this.bossDeathPos.x + ox, this.bossDeathPos.y + oy, 15 + Math.floor(Math.random() * 20), 150, 0.5, c);
                    }

                    // Smoke puffs
                    if (Math.random() < 0.2) {
                        const ox = (Math.random() - 0.5) * 60;
                        const oy = (Math.random() - 0.5) * 60;
                        particleSystem.burst(this.bossDeathPos.x + ox, this.bossDeathPos.y + oy, 8, 60, 0.8, ['#888888', '#aaaaaa', '#cccccc']);
                    }

                    // Final big explosion before transition
                    if (this.bossDeathTimer <= 0) {
                        this.defeated = true;
                        particleSystem.burst(this.bossDeathPos.x, this.bossDeathPos.y, 100, 350, 1.2, ['#ffffff', '#ffff00', '#ffaa00', '#ff0000']);
                    }

                    // Hide boss sprite
                    this.boss = null;
                }

                // Update floating texts
                this.floatingTexts = this.floatingTexts.filter(ft => ft.isAlive());
                for (let ft of this.floatingTexts) {
                    ft.update(dt);
                }
            }

            draw(ctx) {
                // Screen shake
                let shakeX = 0, shakeY = 0;
                if (this.screenShake > 0) {
                    shakeX = (Math.random() - 0.5) * 4 * this.screenShake;
                    shakeY = (Math.random() - 0.5) * 4 * this.screenShake;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                this.map.draw(ctx);

                for (let enemy of this.enemies) {
                    enemy.draw(ctx);
                }

                if (this.boss) {
                    this.boss.draw(ctx);
                }

                particleSystem.draw(ctx);

                for (let proj of this.projectiles) {
                    proj.draw(ctx);
                }

                for (let ft of this.floatingTexts) {
                    ft.draw(ctx);
                }

                ctx.restore();

                // Damage flash
                if (this.damageFlash > 0) {
                    ctx.globalAlpha = this.damageFlash * 0.3;
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                    ctx.globalAlpha = 1;
                }
            }

            isBossSpawned() {
                return this.boss !== null;
            }

            allEnemiesDefeated() {
                return this.enemies.length === 0 && !this.boss;
            }
        }

        // ==================== PANTALLAS ====================

            update(dt) {}
            draw(ctx) {}
            handleInput(inputManager) {}
        }

        class TitleScreen extends Screen {

                    audioSystem.playSfx('menuBack');
                    this.inputCooldown = 0.3;
                    return 'TITLE';
                }

                const kbUp = inputManager.isKeyPressed('ArrowUp') || inputManager.isKeyPressed('w') || inputManager.isKeyPressed('W');
                const kbDown = inputManager.isKeyPressed('ArrowDown') || inputManager.isKeyPressed('s') || inputManager.isKeyPressed('S');
                const kbConfirm = inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter');

                    this.selectedCount = (this.selectedCount - 1 + 4) % 4;
                    this.inputCooldown = 0.2;
                    audioSystem.playSfx('menuSelect');
                }
                if (kbDown || inputManager.anyGamepadDown()) {
                    this.selectedCount = (this.selectedCount + 1) % 4;
                    this.inputCooldown = 0.2;

                    const playerCount = this.selectedCount + 1;
                    return { nextState: 'DIFFICULTY_SELECT', playerCount: playerCount };
                }

                return null;
            }

                this.selectionTime += dt;

            handleInput(inputManager) {
                this.inputCooldown = Math.max(0, this.inputCooldown - 0.016);
                if (this.inputCooldown > 0) return null;

                if (inputManager.isKeyPressed('Escape') || inputManager.anyGamepadBack()) {
                    audioSystem.playSfx('menuBack');
                    this.inputCooldown = 0.3;
                    if (this.currentPlayer > 0) {
                        // Undo last character selection
                        this.currentPlayer--;
                        this.selectedClasses.pop();
                        this.classIndex = 0;
                    } else {
                        return 'DIFFICULTY_SELECT';
                    }
                    return null;
                }

                // Accept both keyboard AND gamepad for ALL players
                const kbUp = inputManager.isKeyPressed('ArrowUp') || inputManager.isKeyPressed('w') || inputManager.isKeyPressed('W');
                const kbDown = inputManager.isKeyPressed('ArrowDown') || inputManager.isKeyPressed('s') || inputManager.isKeyPressed('S');
                const kbConfirm = inputManager.isKeyPressed(' ') || inputManager.isKeyPressed('Enter');

                const moveUp = kbUp || inputManager.anyGamepadUp();
                const moveDown = kbDown || inputManager.anyGamepadDown();
                const confirm = kbConfirm || inputManager.anyGamepadConfirm();

                if (moveUp) {
                    this.classIndex = (this.classIndex - 1 + this.classes.length) % this.classes.length;
                    this.inputCooldown = 0.2;
                    audioSystem.playSfx('menuSelect');
                }
                if (moveDown) {
                    this.classIndex = (this.classIndex + 1) % this.classes.length;
                    this.inputCooldown = 0.2;
                    audioSystem.playSfx('menuSelect');
                }

                if (confirm) {
                    const selectedClass = this.classes[this.classIndex];
                    this.selectedClasses.push(selectedClass);
                    this.currentPlayer++;
                    this.inputCooldown = 0.3;

                    if (this.currentPlayer >= this.playerCount) {
                        return { nextState: 'PLAYING', selectedClasses: this.selectedClasses };
                    } else {
                        this.classIndex = 0;
                    }
                }

                return null;
            }
        }

                    { x: 200, y: 300 },
                    { x: 250, y: 350 },
                    { x: 200, y: 350 },
                    { x: 250, y: 300 }
                ];
